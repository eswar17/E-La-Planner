<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  >

  <title>
    Settings
  </title>

  <link
    rel="stylesheet"
    href="settings.css"
  >

</head>

<body>

  <div class="app">

    <!-- HEADER -->

    <header class="header">

      <h1>
        Settings
      </h1>

      <p>
        Manage backups and app data
      </p>

    </header>

    <!-- CONTENT -->

    <main class="main-content">

      <!-- EXPORT -->

      <section class="settings-card">

        <h2>
          Export Backup
        </h2>

        <p>
          Download your planner data safely.
        </p>

        <button id="exportBtn">

          Export JSON

        </button>

      </section>

      <!-- IMPORT -->

      <section class="settings-card">

        <h2>
          Import Backup
        </h2>

        <p>
          Restore planner data from backup.
        </p>

        <input
          type="file"
          id="importInput"
          accept=".json"
        >

      </section>

      <!-- RESET -->

      <section class="settings-card danger-card">

        <h2>
          Reset Planner
        </h2>

        <p>
          This permanently removes all local data.
        </p>

        <button id="resetBtn">

          Clear All Data

        </button>

      </section>

    </main>

    <!-- NAV -->

    <nav class="bottom-nav">

      <button
        class="nav-item"

        onclick="
          window.location.href='index.html'
        "
      >

        <span class="nav-icon">
          🎲
        </span>

        <span class="nav-text">
          Planner
        </span>

      </button>

      <button
        class="nav-item"

        onclick="
          window.location.href='habits.html'
        "
      >

        <span class="nav-icon">
          🌿
        </span>

        <span class="nav-text">
          Habits
        </span>

      </button>

      <button
        class="nav-item"

        onclick="
          window.location.href='upcoming.html'
        "
      >

        <span class="nav-icon">
          🕒
        </span>

        <span class="nav-text">
          Upcoming
        </span>

      </button>

      <button
        class="nav-item"

        onclick="
          window.location.href='search.html'
        "
      >

        <span class="nav-icon">
          🔍
        </span>

        <span class="nav-text">
          Search
        </span>

      </button>

      <button
        class="
          nav-item
          active
        "
      >

        <span class="nav-icon">
          ⚙️
        </span>

        <span class="nav-text">
          Settings
        </span>

      </button>

    </nav>

  </div>

  <script src="settings.js"></script>

</body>

</html>
